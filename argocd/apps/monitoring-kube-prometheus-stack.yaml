apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-kube-prometheus-stack
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 86.2.0
    helm:
      releaseName: kps
      values: |
        fullnameOverride: kps
        # EKS 관리형 control plane은 스크랩 불가 → down 타겟 방지로 비활성
        kubeEtcd: { enabled: false }
        kubeControllerManager: { enabled: false }
        kubeScheduler: { enabled: false }
        kubeProxy: { enabled: false }

        prometheus:
          prometheusSpec:
            retention: 7d
            # 모든 namespace의 ServiceMonitor/PodMonitor/Rule 수집 (kafka·connect·ops-backend 커스텀 타겟 포함)
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            resources:
              requests: { cpu: 300m, memory: 1Gi }
              limits: { memory: 2Gi }
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources: { requests: { storage: 20Gi } }

        alertmanager:
          alertmanagerSpec:
            resources:
              requests: { cpu: 50m, memory: 128Mi }
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources: { requests: { storage: 2Gi } }

        grafana:
          adminPassword: "admin"
          resources:
            requests: { cpu: 100m, memory: 256Mi }
          persistence:
            enabled: true
            storageClassName: gp3
            size: 5Gi

        prometheus-node-exporter:
          resources:
            requests: { cpu: 50m, memory: 64Mi }

        kube-state-metrics:
          resources:
            requests: { cpu: 50m, memory: 128Mi }

        prometheusOperator:
          resources:
            requests: { cpu: 100m, memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CRD가 커서 client-side apply 한계 회피
