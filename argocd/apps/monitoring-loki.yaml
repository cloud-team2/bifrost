apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-loki
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.3
    helm:
      releaseName: loki
      values: |
        # Loki(로그 저장, filesystem 단일 인스턴스) + Promtail(전 노드 DaemonSet 로그 수집).
        # Grafana/Prometheus는 kube-prometheus-stack 것을 사용 → 여기선 비활성.
        loki:
          enabled: true
          persistence:
            enabled: true
            storageClassName: gp3
            size: 10Gi
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { memory: 1Gi }
        promtail:
          enabled: true
          resources:
            requests: { cpu: 50m, memory: 128Mi }
        grafana:
          enabled: false
        prometheus:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
