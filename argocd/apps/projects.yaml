# ArgoCD AppProject — 앱을 논리 그룹으로 묶고 destination/cluster-resource 가드레일 부여.
# 그룹: platform(공용 인프라) · bifrost(우리 앱) · data(DB) · observability(모니터링).
# bifrost-root는 default 프로젝트 유지(Application CR 관리).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: 클러스터 공용 인프라 (cert-manager·ingress-nginx·sealed-secrets·cicd-ingress)
  sourceRepos: ['*']
  destinations:
    - { server: https://kubernetes.default.svc, namespace: cert-manager }
    - { server: https://kubernetes.default.svc, namespace: ingress-nginx }
    - { server: https://kubernetes.default.svc, namespace: sealed-secrets }
    - { server: https://kubernetes.default.svc, namespace: default }
    - { server: https://kubernetes.default.svc, namespace: jenkins }
    - { server: https://kubernetes.default.svc, namespace: harbor }
    - { server: https://kubernetes.default.svc, namespace: argocd }
  clusterResourceWhitelist:
    - { group: '*', kind: '*' }   # CRD·ClusterRole·IngressClass·Webhook 설치 필요
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bifrost
  namespace: argocd
spec:
  description: 우리 애플리케이션 (bifrost-services·bifrost-secrets)
  sourceRepos: ['*']
  destinations:
    - { server: https://kubernetes.default.svc, namespace: bifrost-system }
  # cluster-scoped 리소스 불필요 → 화이트리스트 없음(거부) = 가드레일
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data
  namespace: argocd
spec:
  description: 데이터 스토어 (databases=metadb+agentdb · tenantdb)
  sourceRepos: ['*']
  destinations:
    - { server: https://kubernetes.default.svc, namespace: default }
    - { server: https://kubernetes.default.svc, namespace: metadb }
    - { server: https://kubernetes.default.svc, namespace: agentdb }
    - { server: https://kubernetes.default.svc, namespace: tenantdb }
  clusterResourceWhitelist:
    - { group: '', kind: Namespace }   # 각 DB의 00-namespace.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: 모니터링 (kube-prometheus-stack·loki·tempo)
  sourceRepos: ['*']
  destinations:
    - { server: https://kubernetes.default.svc, namespace: monitoring }
  clusterResourceWhitelist:
    - { group: '*', kind: '*' }   # kube-prometheus-stack CRD·ClusterRole 다수
