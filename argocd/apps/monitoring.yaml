apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  # kube-prometheus-stack(л©”нҠёлҰӯ/Grafana/Alertmanager) + loki(лЎңк·ё) + tempo(trace)лҘј лӢЁмқј м•ұмңјлЎң нҶөн•© (#124, ArgoCD м•ұ м •лҰ¬)
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 86.2.0
      helm:
        releaseName: kps
        values: |
          fullnameOverride: kps
          # EKS кҙҖлҰ¬нҳ• control planeмқҖ мҠӨнҒ¬лһ© л¶Ҳк°Җ вҶ’ down нғҖкІҹ л°©м§ҖлЎң л№„нҷңм„ұ
          kubeEtcd: { enabled: false }
          kubeControllerManager: { enabled: false }
          kubeScheduler: { enabled: false }
          kubeProxy: { enabled: false }
      
          prometheus:
            prometheusSpec:
              retention: 7d
              # лӘЁл“  namespaceмқҳ ServiceMonitor/PodMonitor/Rule мҲҳм§‘ (kafkaВ·connectВ·ops-backend м»ӨмҠӨн…Җ нғҖкІҹ нҸ¬н•Ё)
              serviceMonitorSelectorNilUsesHelmValues: false
              podMonitorSelectorNilUsesHelmValues: false
              ruleSelectorNilUsesHelmValues: false
              probeSelectorNilUsesHelmValues: false
              resources:
                requests: { cpu: 300m, memory: 1Gi }
                limits: { memory: 2Gi }
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: gp3
                    accessModes: ["ReadWriteOnce"]
                    resources: { requests: { storage: 20Gi } }
      
          alertmanager:
            alertmanagerSpec:
              resources:
                requests: { cpu: 50m, memory: 128Mi }
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: gp3
                    accessModes: ["ReadWriteOnce"]
                    resources: { requests: { storage: 2Gi } }
      
          grafana:
            adminPassword: "admin"
            resources:
              requests: { cpu: 100m, memory: 256Mi }
            persistence:
              enabled: true
              storageClassName: gp3
              size: 5Gi
            # Prometheus(кё°ліё=isDefault) мҷём—җ Tempo(trace) datasource м¶”к°Җ (#124).
            # Loki datasourceлҠ” loki-stackмқҙ мһҗмІҙ мғқм„ұн•ҳлҜҖлЎң м—¬кё°м„ң мӨ‘ліө м¶”к°Җн•ҳм§Җ м•ҠлҠ”лӢӨ.
            additionalDataSources:
              - name: Tempo
                type: tempo
                access: proxy
                url: http://tempo.monitoring.svc.cluster.local:3200
      
          prometheus-node-exporter:
            resources:
              requests: { cpu: 50m, memory: 64Mi }
      
          kube-state-metrics:
            resources:
              requests: { cpu: 50m, memory: 128Mi }
      
          prometheusOperator:
            resources:
              requests: { cpu: 100m, memory: 128Mi }
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki-stack
      targetRevision: 2.10.3
      helm:
        releaseName: loki
        values: |
          # Loki(лЎңк·ё м ҖмһҘ, filesystem лӢЁмқј мқёмҠӨн„ҙмҠӨ) + Promtail(м „ л…ёл“ң DaemonSet лЎңк·ё мҲҳм§‘).
          # Grafana/PrometheusлҠ” kube-prometheus-stack кІғмқ„ мӮ¬мҡ© вҶ’ м—¬кё°м„  л№„нҷңм„ұ.
          loki:
            enabled: true
            # Prometheusк°Җ мң мқјн•ң кё°ліё datasource вҶ’ loki-stackмқҳ LokiлҠ” л№„кё°ліёмңјлЎң (кё°ліё мӨ‘ліө л°©м§Җ)
            isDefault: false
            persistence:
              enabled: true
              storageClassName: gp3
              size: 10Gi
            resources:
              requests: { cpu: 250m, memory: 512Mi }
              limits: { memory: 1Gi }
          promtail:
            enabled: true
            resources:
              requests: { cpu: 50m, memory: 128Mi }
          grafana:
            enabled: false
          prometheus:
            enabled: false
    - repoURL: https://grafana.github.io/helm-charts
      chart: tempo
      targetRevision: 1.24.4
      helm:
        releaseName: tempo
        values: |
          # лӢЁмқј мқёмҠӨн„ҙмҠӨ Tempo. OTLP(4317/4318) мҲҳмӢ  нҷңм„ұ вҖ” м•ұмқҙ OTLPлЎң trace м „мҶЎ мӢң мҲҳмӢ .
          # нҳ„мһ¬ м•ұ OTLP кі„мёЎ м „мқҙлқј л№„м–ҙмһҲмңјлӮҳ, м„Өкі„ В§6.7 л°ҳмҳҒ + н–Ҙнӣ„ кі„мёЎ лҢҖл№„ м„ л°°нҸ¬.
          tempo:
            retention: 168h
            storage:
              trace:
                backend: local
                local:
                  path: /var/tempo/traces
            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: 0.0.0.0:4317
                  http:
                    endpoint: 0.0.0.0:4318
            resources:
              requests: { cpu: 100m, memory: 256Mi }
              limits: { memory: 512Mi }
          persistence:
            enabled: true
            storageClassName: gp3
            size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  # loki-stack StatefulSetлҠ” kube-controller-managerк°Җ мқјл¶Җ н•„л“ңлҘј defaulting/co-own вҶ’ SSA нҷҳкІҪм—җм„ң мҳҒкө¬ OutOfSync мң л°ң.
  # н•ҙлӢ№ л§ӨлӢҲм Җ мҶҢмң  н•„л“ңлҠ” л№„көҗм—җм„ң м ңмҷё (н‘ңмӨҖ нҢЁн„ҙ).
  ignoreDifferences:
    # loki-stack м°ЁнҠёк°Җ л№Ҳ м»¬л үм…ҳмқ„ л ҢлҚ” вҶ’ k8sк°Җ drop вҶ’ SSA нҷҳкІҪм—җм„ң мҳҒкө¬ OutOfSync.
    - group: apps
      kind: StatefulSet
      name: loki
      jsonPointers:
        - /spec/template/spec/initContainers
        - /spec/template/spec/tolerations
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # kube-prometheus-stack CRDк°Җ м»Өм„ң client-side apply н•ңкі„ нҡҢн”ј
