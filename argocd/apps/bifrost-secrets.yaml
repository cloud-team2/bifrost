apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bifrost-secrets
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  # bifrost-system 시크릿을 SealedSecret(암호화)으로 GitOps 관리. 컨트롤러가 복호화해 Secret 생성.
  source:
    repoURL: https://github.com/cloud-team2/bifrost.git
    targetRevision: gitops
    path: secrets/bifrost-system
    directory: { recurse: true }
  destination:
    server: https://kubernetes.default.svc
    namespace: bifrost-system
  syncPolicy:
    automated: { prune: false, selfHeal: true }   # 시크릿은 prune off (실수 삭제 방지), selfHeal로 복구
    syncOptions: [CreateNamespace=true]
