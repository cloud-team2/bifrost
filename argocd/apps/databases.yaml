apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: databases
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://github.com/cloud-team2/bifrost.git
    targetRevision: gitops
    path: databases
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default      # 각 리소스가 자체 metadata.namespace(metadb/agentdb/tenantdb) 지정
  syncPolicy:
    automated: { prune: false, selfHeal: true }   # DB는 prune off (데이터 보호)
