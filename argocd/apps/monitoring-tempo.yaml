apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-tempo
  namespace: argocd
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo
    targetRevision: 1.24.4
    helm:
      releaseName: tempo
      values: |
        # 단일 인스턴스 Tempo. OTLP(4317/4318) 수신 활성 — 앱이 OTLP로 trace 전송 시 수신.
        # 현재 앱 OTLP 계측 전이라 비어있으나, 설계 §6.7 반영 + 향후 계측 대비 선배포.
        tempo:
          retention: 168h
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { memory: 512Mi }
        persistence:
          enabled: true
          storageClassName: gp3
          size: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
