# 운영 환경에서는 이 파일을 git에 올리지 말고 AWS Secrets Manager 또는
# Sealed Secrets / External Secrets Operator를 사용할 것
apiVersion: v1
kind: Secret
metadata:
  name: metadb-credentials
  namespace: metadb
type: Opaque
stringData:
  POSTGRES_DB: metadb
  POSTGRES_USER: platform
  POSTGRES_PASSWORD: "changeme-before-deploy!"
  DATABASE_URL: "postgresql://platform:changeme-before-deploy!@metadb-service.metadb.svc.cluster.local:5432/metadb"
