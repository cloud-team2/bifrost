apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadb
  namespace: metadb
  labels:
    app: metadb
spec:
  replicas: 1
  # 단일 복제 + RWO PVC → 롤링 시 Multi-Attach 데드락 방지 (구 파드 종료 후 신규 기동)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: metadb
  template:
    metadata:
      labels:
        app: metadb
    spec:
      # #119: metadb는 부하가 작아 격리 불필요 → app 풀(기본)에 배치. data 풀은 Kafka 전용.
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: metadb-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "platform", "-d", "metadb"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "platform", "-d", "metadb"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: metadb-pvc
