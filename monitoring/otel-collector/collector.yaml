# 앱(ops-backend) trace tail-sampling용 OTel Collector (#370).
# 앱이 trace를 전량(sampling=1.0) Collector로 보내면, Collector가 trace 단위로 모아 보고
# 에러 또는 지연(임계 초과) trace만 Tempo에 저장한다(무작위 head-sampling이 놓치던 장애를 자동 포착).
# tail_sampling processor는 contrib 배포에만 있어 contrib 이미지를 사용한다.
# 데이터플레인(워커) trace는 #370 범위 밖(#371, 그대로).
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  collector.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      tail_sampling:
        decision_wait: 10s          # trace의 모든 span을 모으는 대기 창
        num_traces: 10000           # 메모리에 동시 보관할 trace 수 상한(#666: 50000→10000, 저볼륨 앱 trace에 맞춰 memory_limiter Refusing data 해소)
        policies:
          # 에러 trace는 무조건 보존
          - name: errors
            type: status_code
            status_code:
              status_codes: [ERROR]
          # 1s 초과 느린 trace 보존
          - name: slow
            type: latency
            latency:
              threshold_ms: 1000
          # (#666) dataplane(Connect) 추적 보존. Connect 워커가 always_on으로 전량 보내고, 여기서
          # cdc./eda. 토픽 publish span만 keep한다. poll-loop·내부토픽(platform-connect-*) 노이즈는
          # 매칭 정책이 없어 drop → Tempo 폭주 없이 파이프라인 Tracing 탭에 dataplane trace가 보인다.
          - name: dataplane
            type: string_attribute
            string_attribute:
              key: messaging.destination.name
              values: ["^(cdc|eda)\\."]
              enabled_regex_matching: true
      batch: {}
    exporters:
      otlphttp:
        endpoint: http://tempo.monitoring:4318
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, tail_sampling, batch]
          exporters: [otlphttp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  # tail_sampling은 한 trace의 모든 span이 같은 인스턴스로 와야 동작 → 단일 replica(앱 trace 저볼륨).
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.111.0
          args: ["--config=/conf/collector.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
          volumeMounts:
            - name: config
              mountPath: /conf
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
