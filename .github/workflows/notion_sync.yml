name: Sync GitHub Work Log to Notion

on:
  pull_request:
    types: [closed]
  issues:
    types: [opened, closed, reopened, edited]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: notion-sync-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DB_ID: ${{ secrets.NOTION_DB_ID || '37cb7cb3-2d91-81cf-b930-f137189b41c4' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync event to Notion
        run: python scripts/notion_sync.py
