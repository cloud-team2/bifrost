replicaCount: 1

image:
  repository: hwnnn/operations-backend
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: prod
  # metadb: namespace=metadb, service=metadb-service (실제 manifest 기준)
  META_DB_URL: jdbc:postgresql://metadb-service.metadb.svc.cluster.local:5432/metadb
  # Kafka: plain 9092 (dev 환경, 운영 전 scram 9094로 교체)
  KAFKA_BOOTSTRAP: platform-kafka-kafka-bootstrap.platform-kafka.svc.cluster.local:9092
  AI_SERVICE_URL: http://ai-service.bifrost-system.svc.cluster.local:8082
  # Provisioning 모드: real = Fabric8/Strimzi CR 생성, mock = in-memory stub
  PROVISIONING_MODE: real
  # Kafka 클러스터/Connect 식별자 (application-dev.yml 기본값과 일치)
  KAFKA_CLUSTER_NAME: platform-kafka
  KAFKA_CLUSTER_NAMESPACE: platform-kafka
  KAFKA_CONNECT_CLUSTER: platform-connect

secrets:
  jwtSecret: ""        # K8s Secret 'jwt-secret' 참조
  dbPassword: ""       # K8s Secret 'core-db-secret' 참조

ingress:
  enabled: true
  className: alb
  hosts:
    - host: api.platform.example.com
      paths:
        - path: /
          pathType: Prefix
