replicaCount: 1

image:
  # in-cluster Harbor (library 프로젝트). 빌드/배포는 CICD(#123, Jenkins→Harbor→ArgoCD).
  repository: harbor.harbor.svc.cluster.local/library/bifrost-operations-backend
  pullPolicy: IfNotPresent
  tag: latest

# Harbor pull 인증 (harbor-push-secret을 bifrost-system에 복제)
imagePullSecrets:
  - name: harbor-push-secret

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: prod
  # metadb: namespace=metadb, service=metadb-service (실제 manifest 기준)
  META_DB_URL: jdbc:postgresql://metadb-service.metadb.svc.cluster.local:5432/metadb
  # Kafka: plain 9092 (dev 환경, 운영 전 scram 9094로 교체)
  KAFKA_BOOTSTRAP: platform-kafka-kafka-bootstrap.platform-kafka.svc.cluster.local:9092
  AI_SERVICE_URL: http://ai-service.bifrost-system.svc.cluster.local:8082
  # Provisioning 모드: real = Fabric8/Strimzi CR 생성, mock = in-memory stub
  PROVISIONING_MODE: real
  # Kafka 클러스터/Connect 식별자 (application-dev.yml 기본값과 일치)
  KAFKA_CLUSTER_NAME: platform-kafka
  KAFKA_CLUSTER_NAMESPACE: platform-kafka
  KAFKA_CONNECT_CLUSTER: platform-connect

secrets:
  jwtSecret: ""        # K8s Secret 'jwt-secret' 참조
  dbPassword: ""       # K8s Secret 'core-db-secret' 참조

# 외부 노출: frontend와 같은 ALB(bifrost-app 그룹)에서 path 라우팅. /api·/ws → 이 백엔드.
# (frontend = `/` catch-all, order는 백엔드를 먼저 평가하도록 낮게)
ingress:
  enabled: true
  className: alb
  groupName: bifrost-app
  groupOrder: "10"
  # 공개 서브넷 (harbor-ingress와 동일)
  subnets: subnet-0d8a1dcc1e064b04d,subnet-05e64cd452e9a3c55
  healthcheckPath: /actuator/health/readiness
  paths:
    - /api
    - /ws
