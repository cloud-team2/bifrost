replicaCount: 1

image:
  repository: your-account.dkr.ecr.ap-northeast-2.amazonaws.com/core-service
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  SPRING_PROFILES_ACTIVE: prod
  META_DB_URL: jdbc:postgresql://meta-db.platform.svc.cluster.local:5432/metadb
  KAFKA_BOOTSTRAP: kafka-bootstrap.platform-kafka.svc.cluster.local:9092
  ORCHESTRATOR_URL: http://orchestrator-service.platform.svc.cluster.local:8081
  AI_SERVICE_URL: http://ai-service.platform.svc.cluster.local:8082

secrets:
  jwtSecret: ""        # K8s Secret 'jwt-secret' 참조
  dbPassword: ""       # K8s Secret 'core-db-secret' 참조

ingress:
  enabled: true
  className: alb
  hosts:
    - host: api.platform.example.com
      paths:
        - path: /
          pathType: Prefix
