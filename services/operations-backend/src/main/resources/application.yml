spring:
  application:
    name: operations-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    # OSIV off(#731): 기본값(true)은 요청 전체 동안 DB 커넥션을 잡아, 메트릭 엔드포인트의 느린
    # Prometheus 호출이나 sync-status의 source/sink COUNT(~22s) 동안 HikariCP 풀을 점유해
    # 배포환경에서 풀 고갈(Connection is not available)·Overview 500을 유발했다. 끄면 커넥션을
    # 리포지토리 호출 직후 반납해 느린 외부 호출이 풀을 잡지 않는다.
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  # 분산 추적 → Tempo (OTLP HTTP). 엔드포인트/샘플링은 환경변수로 오버라이드. (#366)
  # 로컬 기본값은 Tempo 직송 + head-sampling 0.1(10%): 100% 직송은 Tempo를 폭주시킴(OOM).
  # dev/prod(gitops)에서는 env로 OTLP_TRACING_ENDPOINT=otel-collector:4318 + TRACING_SAMPLE_RATE=1.0 으로
  # 오버라이드 → 전량을 OTel Collector로 보내고 tail-sampling(에러/지연만 보존)이 저장량을 줄임. (#370)
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://tempo.monitoring:4318/v1/traces}

# 데이터플레인 추적(#371): 신규 source 커넥터에 Debezium tracing SMT 추가. 기본 off(오버헤드 없음).
# 워커 OTel 계측(infra/k8s/kafka/kafka-connect.yaml) 전제. 켜면 이후 생성되는 파이프라인이 추적됨.
tracing:
  dataplane:
    enabled: ${DATAPLANE_TRACING_ENABLED:false}

# query_traces Tempo 조회(#373). 기본 off → well-formed stub 반환(파싱 안전). dev에서 TEMPO_ENABLED=true로 라이브.
# url은 Tempo HTTP query API(기본 3200). OTLP 송신(4318)과는 별개 포트.
tempo:
  enabled: ${TEMPO_ENABLED:false}
  url: ${TEMPO_URL:http://tempo.monitoring:3200}

# /internal/ops service-to-service 인증(#646). 값이 있으면 ai-service가 동봉하는 X-Internal-Token과
# 일치할 때만 /internal/ops/**를 허용한다. 비면 게이트 비활성 → 로컬/기존 환경 호환. gitops가 ai-service
# (AI_INTERNAL_OPS_TOKEN)와 동일 시크릿을 주입한다.
internal:
  ops:
    token: ${INTERNAL_OPS_TOKEN:}

# 라이브 read-tool 스모크 프로젝트 복구 seed(#650). 수동 DB INSERT 대신 앱 부트스트랩에서
# 고정 UUID(11111111-2222-3333-4444-555555555555) 프로젝트와 최소 샘플 데이터를 보장한다.
smoke:
  seed:
    enabled: ${SMOKE_SEED_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

kafka-connect:
  rest-url: ${KAFKA_CONNECT_REST_URL:}
  connect-timeout-ms: ${KAFKA_CONNECT_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${KAFKA_CONNECT_READ_TIMEOUT_MS:3000}
