spring:
  application:
    name: operations-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  # 분산 추적 → Tempo (OTLP HTTP). 엔드포인트/샘플링은 환경변수로 오버라이드. (#366)
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://tempo.monitoring:4318/v1/traces}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

kafka-connect:
  rest-url: ${KAFKA_CONNECT_REST_URL:}
  connect-timeout-ms: ${KAFKA_CONNECT_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${KAFKA_CONNECT_READ_TIMEOUT_MS:3000}
