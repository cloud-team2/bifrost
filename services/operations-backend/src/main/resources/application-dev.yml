spring:
  datasource:
    url: ${META_DB_URL:jdbc:postgresql://localhost:5433/metadb}
    username: ${META_DB_USER:platform}
    password: ${META_DB_PASSWORD:platform}
    driver-class-name: org.postgresql.Driver
    hikari:
      # (#731) 풀 고갈 방어. OSIV off로 점유 시간이 짧아지지만, 부하 버스트 여유를 위해 상향하고
      # connection-timeout을 30s(기본)→8s로 줄여 풀이 비면 빠르게 실패(요청 누적·liveness kill 방지).
      # leak-detection으로 60s 이상 점유된 커넥션을 로그로 감지한다.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:25}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:8000}
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    # show-sql(raw stdout)과 org.hibernate.SQL 로거가 둘 다 켜지면 같은 SQL이 중복 출력된다.
    # 로거(org.hibernate.SQL=DEBUG)로 한 번만 남기고 raw 출력은 끈다(#99).
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: operations-backend
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.bifrost.ops.common.events"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      ack-mode: manual_immediate

# JWT
jwt:
  secret: ${JWT_SECRET:local-dev-secret-please-change-in-production-must-be-long-enough-for-hs256}
  expiration-hours: 24
  issuer: bifrost-ops

# Secret 저장소 (DB 자격증명 보관)
# db = DbSecretStore (metadb secrets 테이블 영속). mock = InMemorySecretStore (재시작 시 휘발).
secret-store:
  provider: ${SECRET_STORE_PROVIDER:db}

# 파이프라인 provisioner는 Strimzi(K8s) 단일 경로 — 파이프라인 생성에는 kind+Strimzi가 필요하다.
# (KafkaConnector CR apply + KafkaConnectorWatcher 상태 반영). KUBECONFIG로 대상 클러스터를 지정한다.

# Prometheus (Kafka 메트릭 조회)
# enabled=true로 바꾸면 OffsetSnapshot 대신 Prometheus에서 produce/consume rate·lag를 읽는다.
# 포트포워드: kubectl port-forward svc/prometheus 9090:9090 -n platform-kafka
prometheus:
  url: ${PROMETHEUS_URL:http://localhost:9090}
  enabled: ${PROMETHEUS_ENABLED:false}

# Loki (로그 조회, S4)
# 클러스터 내: loki.monitoring:3100 / 로컬 포트포워드: kubectl port-forward svc/loki 3100:3100 -n monitoring
loki:
  url: ${LOKI_URL:http://loki.monitoring:3100}

# Tempo (query_traces 분산 trace 조회, #373). dev는 라이브 — Tempo가 떠 있고 trace 수신 중.
# 클러스터 내: tempo.monitoring:3200 / 로컬 포트포워드: kubectl port-forward svc/tempo 3200:3200 -n monitoring
tempo:
  url: ${TEMPO_URL:http://tempo.monitoring:3200}
  enabled: ${TEMPO_ENABLED:true}


# 외부 서비스 (Agent는 별도 FastAPI)
ai-service:
  url: ${AI_SERVICE_URL:}
  enabled: false   # Sprint 4부터 true

# K8s 설정 (provisioning/watcher in-process)
k8s:
  # 로컬에선 kubeconfig 사용. EKS에선 ServiceAccount 토큰 자동.
  config-file: ${KUBECONFIG:}

# Kafka 클러스터 정보 (생성한 KafkaUser/Connector가 어느 클러스터에 속하는지)
kafka-cluster:
  name: platform-kafka
  namespace: platform-kafka

# KafkaConnect 클러스터 (KafkaConnector CR의 strimzi.io/cluster 라벨 기준)
# rest-url: S1 ConnectRestPoller, S4 query_traces에서 사용
kafka-connect:
  cluster: platform-connect
  rest-url: ${KAFKA_CONNECT_REST_URL:}
  connect-timeout-ms: ${KAFKA_CONNECT_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${KAFKA_CONNECT_READ_TIMEOUT_MS:3000}

# Consumer Group Discovery polling
discovery:
  consumer-group-polling-interval-seconds: 30

# Kafka 토픽
platform:
  internal-topics:
    connector-status: platform.internal.connector-status
    service-discovered: platform.internal.service-discovered

logging:
  level:
    root: INFO
    com.bifrost: DEBUG
    bifrost.ops: INFO          # 비즈니스 이벤트 가독 로그(#93, [도메인] 작업)
    org.springframework.web: INFO
    org.hibernate.SQL: INFO    # SQL 끔 — [도메인] 흐름 로그만 보이게(#99)
    io.fabric8.kubernetes.client: INFO
    # Kafka 클라이언트: K8s 내부 advertised address(platform-kafka-kafka-0.*.svc)를 호스트에서
    # 직접 resolve할 수 없을 때 발생하는 연결 실패 WARN을 억제한다.
    # 이는 port-forward 로컬 개발 환경의 known limitation이며 앱 기능에 영향 없음.
    org.apache.kafka.clients.NetworkClient: ERROR
