server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # AI Agent API 프록시 (gitops chart는 이 worktree에 없으므로 서비스명은 기존 컨벤션, 포트는 ai-service config.py 기준)
    location = /api/v1/agent {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v1/agent/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/approvals {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v1/approvals/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI 메타 라우트(#377) — ai-service가 /api/v1/health·/ready·/version·/capabilities를 직접 서빙한다.
    # generic `location /api`(operations-backend)로 떨어지면 Spring 404(code 90006)가 나므로,
    # 정확 매치(location =)로 분리해 우선순위를 보장한다(=는 prefix보다 항상 우선).
    location = /api/v1/health {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/ready {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/version {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/capabilities {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # internal-ops(#377) — Spring InternalOpsController 엔드포인트(/health·/ready·/admin/tool-catalog·
    # /projects/{id}/...). 룰이 없으면 SPA(`location /`)가 index.html을 반환하므로 prefix 우선(^~)으로
    # operations-backend에 보낸다. proxy_pass에 trailing slash 없음 → 원본 /internal/ops/... 경로 보존.
    location ^~ /internal/ops/ {
        proxy_pass http://operations-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API 프록시 (필요 시. 보통은 ALB가 path 기반 라우팅으로 처리)
    location /api {
        proxy_pass http://operations-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://operations-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
