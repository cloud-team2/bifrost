server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Spring actuator endpoints should not fall through to SPA index.html.
    location = /actuator/health {
        proxy_pass http://operations-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /actuator/info {
        proxy_pass http://operations-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # AI Agent API 프록시 (gitops chart는 이 worktree에 없으므로 서비스명은 기존 컨벤션, 포트는 ai-service config.py 기준)
    location = /api/v1/agent {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v1/agent/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/approvals {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v1/approvals/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI tool/catalog 라우트(#542) — slash command가 ai-service 도구 카탈로그를 호출한다.
    # generic `location /api`(operations-backend)보다 먼저 매치되어야 Spring 404(code 90006)를 피한다.
    location = /api/v1/tools {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v1/tools/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/catalogs {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v1/catalogs/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # incident 리포트 라우트(#647) — ai-service가 top-level /api/v1/incidents/{id}/reports를 서빙한다.
    # Spring incident는 workspace-scoped(/api/v1/workspaces/{wsId}/monitoring/incidents/...)라 충돌하지 않는다.
    # generic `location /api`(operations-backend)로 떨어지면 Spring auth 게이트가 401(code 10003)을 내므로
    # prefix 우선(^~)으로 ai-service에 보낸다.
    location ^~ /api/v1/incidents/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # admin 라우트(#647) — ai-service가 /api/v1/admin/{models,dependencies,...}를 서빙한다.
    # Spring에는 /api/v1/admin 매핑이 없어(tool-catalog은 /internal/ops/admin) 충돌하지 않는다.
    location = /api/v1/admin {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /api/v1/admin/ {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FastAPI 메타 라우트(#377) — ai-service가 /api/v1/health·/ready·/version·/capabilities를 직접 서빙한다.
    # generic `location /api`(operations-backend)로 떨어지면 Spring 404(code 90006)가 나므로,
    # 정확 매치(location =)로 분리해 우선순위를 보장한다(=는 prefix보다 항상 우선).
    location = /api/v1/health {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/ready {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/version {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /api/v1/capabilities {
        proxy_pass http://ai-service:8082;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # internal-ops(#646) — /internal/ops/**는 에이전트 전용 내부 API다. 공개 진입점인 프론트에서
    # 프록시하면 외부 무인증 노출이 되므로 의도적으로 라우팅하지 않는다(요청은 SPA로 떨어져 index.html 반환).
    # ai-service는 내부 DNS(operations-backend:8080)로 직접 호출한다(AI_SPRING_OPS_BASE_URL).
    # 추가로 ops-backend는 internal.ops.token 설정 시 X-Internal-Token service-identity 게이트로 보호한다.

    # API 프록시 (필요 시. 보통은 ALB가 path 기반 라우팅으로 처리)
    location /api {
        proxy_pass http://operations-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://operations-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
