replicaCount: 1

image:
  repository: hwnnn/ai-service
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8082

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

env:
  # Agent의 모든 운영 조회/조치 위임 대상 (Spring 모놀리스 /internal/ops)
  AI_SPRING_OPS_BASE_URL: http://operations-backend.platform.svc.cluster.local:8080
  AI_LLM_PROVIDER: openai
  AI_LLM_DEFAULT_MODEL: gpt-4o-mini

secrets:
  llmApiKey: ""   # K8s Secret 'ai-llm-secret'의 api-key 참조 (선택)

# Agent는 내부 서비스 — 외부 노출은 별도 게이트웨이/operations-backend 경유로 결정
ingress:
  enabled: false
