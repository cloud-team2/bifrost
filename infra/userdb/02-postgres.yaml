---
apiVersion: v1
kind: Secret
metadata:
  name: user-postgres-credentials
  namespace: userdb
type: Opaque
stringData:
  POSTGRES_USER: debezium
  POSTGRES_PASSWORD: debezium
  POSTGRES_DB: testdb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-postgres-pvc
  namespace: userdb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-postgres
  namespace: userdb
  labels:
    app: user-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-postgres
  template:
    metadata:
      labels:
        app: user-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          args:
            - postgres
            - -c
            - config_file=/etc/postgresql/postgresql.conf
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: user-postgres-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "debezium", "-d", "testdb"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: user-postgres-pvc
        - name: config
          configMap:
            name: user-postgres-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-postgres-service
  namespace: userdb
spec:
  selector:
    app: user-postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: LoadBalancer
  loadBalancerSourceRanges:
    - 13.228.214.171/32
    - 52.77.50.136/32
