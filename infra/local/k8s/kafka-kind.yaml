# kind(로컬) 전용 축소 Kafka(#99). EKS용(infra/k8s/kafka/*)은 3브로커·50Gi gp3·ISR2라
# 노트북에 과대 → 1브로커·ephemeral·RF1/ISR1·메모리 1Gi로 축소. 이름/리스너는 백엔드 설정과 동일하게 유지
# (kafka-cluster.name=platform-kafka, scram :9094, plain :9092).
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka
  namespace: platform-kafka
  labels:
    strimzi.io/cluster: platform-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral        # 로컬 데모 — 재시작 시 데이터 휘발(무방)
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: "1"
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: platform-kafka
  namespace: platform-kafka
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: scram
        port: 9094
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: true
  entityOperator:
    topicOperator: {}
    userOperator: {}
