# ──────────────────────────────────────────────────────────────────────────────
# Bifrost infra Helm values (Jenkins / ArgoCD / Harbor)
# 외부 노출: ingress-nginx(NLB) + cert-manager(Let's Encrypt) — ALB 대체 (#232)
# ──────────────────────────────────────────────────────────────────────────────

clusterIssuer: letsencrypt-prod

harbor:
  namespace: harbor
  enabled: true
  host: harbor.skala-ai.com
  servicePort: 80          # harbor 포털 service

jenkins:
  namespace: jenkins
  enabled: true
  host: jenkins.skala-ai.com
  servicePort: 8080        # jenkins service

argocd:
  namespace: argocd
  enabled: true
  host: argocd.skala-ai.com
  servicePort: 80          # argocd-server http (server.insecure=true)
