---
apiVersion: v1
kind: Secret
metadata:
  name: user-mariadb-credentials
  namespace: userdb
type: Opaque
stringData:
  MARIADB_ROOT_PASSWORD: root
  MARIADB_USER: debezium
  MARIADB_PASSWORD: debezium
  MARIADB_DATABASE: testdb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-mariadb-pvc
  namespace: userdb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-mariadb
  namespace: userdb
  labels:
    app: user-mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-mariadb
  template:
    metadata:
      labels:
        app: user-mariadb
    spec:
      containers:
        - name: mariadb
          image: mariadb:10.11
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: user-mariadb-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: config
              mountPath: /etc/mysql/conf.d/cdc.cnf
              subPath: my.cnf
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "mariadb-admin ping -u root -p${MARIADB_ROOT_PASSWORD} --silent"
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: user-mariadb-pvc
        - name: config
          configMap:
            name: user-mariadb-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-mariadb-service
  namespace: userdb
spec:
  selector:
    app: user-mariadb
  ports:
    - port: 3306
      targetPort: 3306
  # 내부 통신만 사용(커넥터는 cluster DNS 직통, 로컬 백엔드는 port-forward). 외부 LB 미사용.
  type: ClusterIP
