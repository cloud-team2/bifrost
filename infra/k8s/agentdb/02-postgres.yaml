---
apiVersion: v1
kind: Secret
metadata:
  name: agentdb-credentials
  namespace: agentdb
type: Opaque
stringData:
  POSTGRES_USER: agent
  POSTGRES_PASSWORD: agent
  POSTGRES_DB: agentdb
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentdb-pvc
  namespace: agentdb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentdb
  namespace: agentdb
  labels:
    app: agentdb
spec:
  replicas: 1
  # 단일 복제 + RWO PVC → 롤링 시 Multi-Attach 데드락 방지
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agentdb
  template:
    metadata:
      labels:
        app: agentdb
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: agentdb-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: postgres
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "agent", "-d", "agentdb"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agentdb-pvc
        - name: init
          configMap:
            name: agentdb-init
---
apiVersion: v1
kind: Service
metadata:
  name: agentdb-service
  namespace: agentdb
spec:
  selector:
    app: agentdb
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
