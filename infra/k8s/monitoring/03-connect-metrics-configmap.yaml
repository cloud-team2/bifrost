# Kafka Connect + Debezium JMX Prometheus Exporter 규칙.
# connect-kind.yaml / connect EKS 매니페스트의 spec.metricsConfig가 이 ConfigMap을 참조한다.
# 소스 지연(MilliSecondsBehindSource 등) Debezium 커넥터 메트릭을 노출한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: connect-metrics-config
  namespace: platform-kafka
data:
  connect-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      # ── Debezium 커넥터 메트릭: server 라벨을 살린 정제 룰 (키 순서 무관하게 매칭) ──
      - pattern: "debezium.([^:]+)<.*server=([^,>]+).*><>(MilliSecondsBehindSource|MilliSecondsSinceLastEvent|NumberOfEventsFiltered|NumberOfErroneousEvents|TotalNumberOfEventsSeen|TotalNumberOfCreateEventsSeen|TotalNumberOfUpdateEventsSeen|TotalNumberOfDeleteEventsSeen|QueueRemainingCapacity|QueueTotalCapacity)"
        name: "debezium_metrics_$3"
        labels:
          plugin: "$1"
          server: "$2"
        type: GAUGE
      # ── 나머지 모든 Debezium 빈: 기본 이름으로라도 노출(디버그/누락 방지) ──
      - pattern: "debezium.*"
      # ── Kafka Connect 태스크 메트릭 ───────────────────────────────────
      - pattern: "kafka.connect<type=connector-task-metrics, connector=([^,]+), task=([^>]+)><>([^:]+)"
        name: "kafka_connect_connector_task_$3"
        labels:
          connector: "$1"
          task: "$2"
        type: GAUGE
      # ── Task error/retry 누적 지표 (Connector 상세 탭) ────────────────
      - pattern: "kafka.connect<type=task-error-metrics, connector=([^,]+), task=([^>]+)><>([^:]+)"
        name: "kafka_connect_task_error_$3"
        labels:
          connector: "$1"
          task: "$2"
        type: GAUGE
      # ── Source/Sink 태스크 처리율 (Connectors 표 records/s, #213) ──────
      - pattern: "kafka.connect<type=source-task-metrics, connector=([^,]+), task=([^>]+)><>([^:]+)"
        name: "kafka_connect_source_task_$3"
        labels:
          connector: "$1"
          task: "$2"
        type: GAUGE
      - pattern: "kafka.connect<type=sink-task-metrics, connector=([^,]+), task=([^>]+)><>([^:]+)"
        name: "kafka_connect_sink_task_$3"
        labels:
          connector: "$1"
          task: "$2"
        type: GAUGE
      # ── Connect worker 집계 (connector/task 수, rebalance, #213) ───────
      - pattern: "kafka.connect<type=connect-worker-metrics><>([^:]+)"
        name: "kafka_connect_worker_$1"
        type: GAUGE
      - pattern: "kafka.connect<type=connect-worker-rebalance-metrics><>([^:]+)"
        name: "kafka_connect_worker_rebalance_$1"
        type: GAUGE
