# cAdvisor — 컨테이너(파드)별 CPU·메모리 메트릭 수집(#212).
# 브로커·Connect 파드의 리소스 사용량(container_cpu_usage_seconds_total, container_memory_working_set_bytes 등).
# kubelet cAdvisor 직접 스크랩은 노드 TLS/인증이 까다로워, 독립 DaemonSet으로 배포한다(로컬·EKS 공통).
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: platform-kafka
  labels:
    app: cadvisor
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      # cAdvisor는 k8s API를 호출하지 않는다. 루트(/)를 마운트하는데 projected SA 토큰 볼륨이
      # /var/lib/kubelet 아래라 docker-desktop에서 init 마운트 충돌이 나므로 자동 마운트를 끈다.
      automountServiceAccountToken: false
      tolerations:
        - operator: Exists
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.49.1
          args:
            - --housekeeping_interval=15s
            - --store_container_labels=false
            # 라벨 폭증 방지: 파드/네임스페이스 식별에 필요한 라벨만 화이트리스트
            - --whitelisted_container_labels=io.kubernetes.pod.name,io.kubernetes.pod.namespace,io.kubernetes.container.name
          ports:
            - name: metrics
              containerPort: 8080
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits:   { cpu: 200m, memory: 256Mi }
          securityContext:
            privileged: true
          volumeMounts:
            - { name: rootfs, mountPath: /rootfs, readOnly: true }
            - { name: var-run, mountPath: /var/run, readOnly: true }
            - { name: sys, mountPath: /sys, readOnly: true }
            - { name: docker, mountPath: /var/lib/docker, readOnly: true }
            - { name: disk, mountPath: /dev/disk, readOnly: true }
      volumes:
        - { name: rootfs, hostPath: { path: / } }
        - { name: var-run, hostPath: { path: /var/run } }
        - { name: sys, hostPath: { path: /sys } }
        - { name: docker, hostPath: { path: /var/lib/docker } }
        - { name: disk, hostPath: { path: /dev/disk } }
