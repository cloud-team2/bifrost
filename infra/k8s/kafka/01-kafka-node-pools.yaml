# KRaft 모드: Controller + Broker를 합친 단일 풀 (캡스톤 비용 절감)
# 프로덕션이라면 controller / broker를 별도 풀로 분리 권장
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka
  namespace: platform-kafka
  labels:
    strimzi.io/cluster: platform-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 50Gi
        class: gp3
        deleteClaim: false
  resources:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 4Gi
      cpu: 2000m
  # #119: 단일 노드풀. broker는 노드별로 분산(anti-affinity)만 — 노드 풀 격리는 하지 않음.
  template:
    pod:
      affinity:
        # 브로커는 가능한 한 서로 다른 노드에 분산(soft) → 단일 노드 장애 시 1개만 영향
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    strimzi.io/cluster: platform-kafka
