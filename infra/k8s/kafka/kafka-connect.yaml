apiVersion: kafka.strimzi.io/v1
kind: KafkaConnect
metadata:
  name: platform-connect
  namespace: platform-kafka
  annotations:
    # KafkaConnector CR로 connector lifecycle 관리
    strimzi.io/use-connector-resources: "true"
spec:
  version: 4.2.0
  replicas: 2   # HA: 단일 파드 SPOF 제거, 장애 시 task rebalance
  bootstrapServers: platform-kafka-kafka-bootstrap:9092

  # 데이터플레인 추적(#371): Connect 워커 OpenTelemetry 계측 → Tempo(OTLP HTTP).
  # Debezium tracing SMT(ActivateTracingSpan)가 만든 span을 OTLP로 송신한다.
  # 켜는 토글은 source 커넥터 config(tracing.dataplane.enabled, ops-backend)이고, 여기는 워커 계측 전제.
  tracing:
    type: opentelemetry

  # 커스텀 이미지(#425). 과거 spec.build(Kaniko in-cluster)는 plugin artifact를 URL로만 받아
  # private repo의 timestamptz 커스텀 컨버터 JAR을 넣을 수 없었다 → spec.image로 일원화.
  # 이미지 정의·플러그인 버전은 infra/docker/kafka-connect/Dockerfile, 빌드/배포는 Jenkinsfile 참조.
  # 포함: debezium-postgres/mariadb 3.5.1.Final, Confluent JDBC sink 10.9.4 + JDBC 드라이버,
  #       timestamptz 커스텀 컨버터(connect-plugins/timestamptz-converter).
  image: harbor.harbor.svc.cluster.local/library/bifrost-kafka-connect:1.0.0-converter

  groupId: platform-connect
  offsetStorageTopic: platform-connect-offsets
  configStorageTopic: platform-connect-configs
  statusStorageTopic: platform-connect-status

  config:
    # dev 클러스터 3 브로커 기준 replication factor (운영은 3으로 올릴 것)
    offset.storage.replication.factor: 3
    config.storage.replication.factor: 3
    status.storage.replication.factor: 3
    key.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: "false"
    value.converter.schemas.enable: "false"
    topic.creation.enable: "true"
    # pipeline 생성 시 Debezium이 자동 생성하는 CDC 토픽 기본값 (설계 §4.1)
    topic.creation.default.replication.factor: "3"
    topic.creation.default.partitions: "3"
    topic.creation.default.cleanup.policy: delete
    topic.creation.default.retention.ms: "604800000"

  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
      cpu: 2

  template:
    # 데이터플레인 추적(#371, #666): OTel SDK exporter 설정. trace를 otel-collector로 보내고,
    # collector tail_sampling이 dataplane(cdc./eda. 토픽) span은 100% 보존, poll-loop 노이즈는 drop한다.
    connectContainer:
      env:
        - name: OTEL_SERVICE_NAME
          value: platform-connect
        # (#666) Tempo 직송(head 5% 샘플) → otel-collector 경유로 변경. 직송+5%는 저볼륨 파이프라인
        # 스팬을 거의 다 드롭해 Tracing 탭이 항상 비었다(라이브 확인). collector의 tail_sampling이
        # cdc./eda. 토픽 span을 보존하므로, 워커는 always_on으로 전량 보내고 선별은 collector가 한다.
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector.monitoring:4318
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: http/protobuf
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_METRICS_EXPORTER
          value: none
        - name: OTEL_LOGS_EXPORTER
          value: none
        # 전량 송신(샘플링은 collector tail_sampling이 담당 — dataplane keep + poll-loop drop).
        - name: OTEL_TRACES_SAMPLER
          value: parentbased_always_on
