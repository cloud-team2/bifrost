apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: platform-kafka
  namespace: platform-kafka
  annotations:
    strimzi.io/kraft: enabled        # ZooKeeper 없이 KRaft 사용
    strimzi.io/node-pools: enabled   # KafkaNodePool 리소스 사용
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV0
    listeners:
      # 클러스터 내부용 (서비스 → Kafka)
      - name: plain
        port: 9092
        type: internal
        tls: false
      # 사용자 컨슈머용 (SCRAM 인증)
      - name: scram
        port: 9094
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: true
  entityOperator:
    topicOperator: {}
    userOperator: {}
    # #119: entity-operator도 data 노드풀에 배치 (platform-kafka 일관 배치)
    template:
      pod:
        tolerations:
          - key: tier
            operator: Equal
            value: data
            effect: NoSchedule
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: tier
                      operator: In
                      values:
                        - data
