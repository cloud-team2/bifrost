apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: platform-kafka
  namespace: platform-kafka
  annotations:
    strimzi.io/kraft: enabled        # ZooKeeper 없이 KRaft 사용
    strimzi.io/node-pools: enabled   # KafkaNodePool 리소스 사용
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV0
    listeners:
      # 클러스터 내부용 (서비스 → Kafka)
      - name: plain
        port: 9092
        type: internal
        tls: false
      # 사용자 컨슈머용 (SCRAM 인증)
      - name: scram
        port: 9094
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: true
    # JMX Prometheus Exporter — 브로커 포트 9404로 메트릭 노출
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml
  # Kafka Exporter — consumer group lag 메트릭 (포트 9308)
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    enableSaramaLogging: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
