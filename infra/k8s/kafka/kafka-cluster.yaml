apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: platform-kafka
  namespace: platform-kafka
spec:
  kafka:
    version: 3.7.1
    replicas: 3
    listeners:
      # 클러스터 내부용 (서비스 → Kafka)
      - name: plain
        port: 9092
        type: internal
        tls: false
      # 사용자 컨슈머용 (SCRAM 인증)
      - name: scram
        port: 9094
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    authorization:
      type: simple
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      # 토픽 자동 생성 비활성화 (우리 시스템이 명시적으로 생성)
      auto.create.topics.enable: false
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 50Gi
          deleteClaim: false
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 10Gi
      deleteClaim: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
