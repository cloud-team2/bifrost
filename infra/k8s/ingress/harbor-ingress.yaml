apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor-alb
  namespace: harbor
  annotations:
    # cicd-shared ALB 그룹 공유 (Harbor → order 10, Jenkins → 20, ArgoCD → 30)
    alb.ingress.kubernetes.io/group.name: cicd-shared
    alb.ingress.kubernetes.io/group.order: "10"
    alb.ingress.kubernetes.io/load-balancer-name: cicd-shared-alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # PUBLIC_SUBNETS: subnet-0d8a1dcc1e064b04d, subnet-05e64cd452e9a3c55
    alb.ingress.kubernetes.io/subnets: subnet-0d8a1dcc1e064b04d,subnet-05e64cd452e9a3c55
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/v2.0/health
    alb.ingress.kubernetes.io/success-codes: "200-399"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=600
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: harbor
                port:
                  number: 80
