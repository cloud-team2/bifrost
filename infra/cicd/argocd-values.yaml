configs:
  params:
    server.insecure: true

server:
  service:
    type: ClusterIP

  # Ingress는 infra/k8s/ingress/argocd-ingress.yaml 에서 별도 관리
  ingress:
    enabled: false

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

repoServer:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

applicationController:
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
