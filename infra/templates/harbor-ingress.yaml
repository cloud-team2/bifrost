{{- if .Values.harbor.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: harbor-alb
  namespace: {{ .Values.harbor.namespace }}
  annotations:
    {{- include "infra.albAnnotations" . | nindent 4 }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.harbor.ingress.groupOrder | quote }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":{{ .Values.harbor.ingress.listenPort }}}]'
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.harbor.ingress.healthcheckPath }}
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds={{ .Values.harbor.ingress.idleTimeout }}
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: harbor
                port:
                  number: {{ .Values.harbor.ingress.listenPort }}
{{- end }}
