{{- if .Values.jenkins.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jenkins-alb
  namespace: {{ .Values.jenkins.namespace }}
  annotations:
    {{- include "infra.albAnnotations" . | nindent 4 }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.jenkins.ingress.groupOrder | quote }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":{{ .Values.jenkins.ingress.listenPort }}}]'
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.jenkins.ingress.healthcheckPath }}
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jenkins
                port:
                  number: {{ .Values.jenkins.ingress.listenPort }}
{{- end }}
