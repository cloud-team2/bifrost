replicaCount: 1

image:
  # in-cluster Harbor (library 프로젝트). 빌드 후 Harbor로 push, 노드는 내부 DNS로 pull.
  repository: harbor.harbor.svc.cluster.local/library/bifrost-ai-service
  pullPolicy: IfNotPresent
  tag: "4ccc9e41"

# Harbor pull 인증 (harbor-push-secret을 배포 네임스페이스에 복제)
imagePullSecrets:
  - name: harbor-push-secret

service:
  type: ClusterIP
  port: 8082

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

env:
  # Agent의 모든 운영 조회/조치 위임 대상 (Spring 모놀리스 /internal/ops)
  AI_SPRING_OPS_BASE_URL: http://operations-backend.bifrost-system.svc.cluster.local:8080
  AI_LLM_PROVIDER: openai
  AI_LLM_DEFAULT_MODEL: gpt-4o-mini
  # Agent Run Store / Knowledge Vector Store (pgvector).
  # 코드 기대 env = AI_DATABASE_URL (config.py: env_prefix=AI_, field=database_url). 드라이버 prefix는 db.py가 asyncpg용으로 strip.
  AI_DATABASE_URL: postgresql+asyncpg://agent:agent@agentdb-service.agentdb.svc.cluster.local:5432/agentdb
  # 분산 추적(#372): 에이전트 run span을 OTel Collector 경유로 송신(tail-sampling #370 공유, ops-backend #366과 동일 경로).
  # httpx가 Spring 호출에 traceparent 주입 → ops-backend(Micrometer)가 추출해 한 trace로 연결.
  AI_OTLP_TRACING_ENDPOINT: http://otel-collector.monitoring:4318/v1/traces
  AI_TRACING_SAMPLE_RATE: "1.0"

secrets:
  llmApiKey: ""   # K8s Secret 'ai-llm-secret'의 api-key 참조 (선택)

# RAG 코퍼스 시딩 (#776). 마이그레이션 후 PostSync Job으로 knowledge_chunk 적재.
# corpus_seed.py가 임베딩 키 없으면 실패하므로, ai-llm-secret에 실제 키가 있어야 의미 있음.
knowledgeSeed:
  enabled: true
  backoffLimit: 3

# Agent는 내부 서비스 — 외부 노출은 별도 게이트웨이/operations-backend 경유로 결정
ingress:
  enabled: false
