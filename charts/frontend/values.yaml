replicaCount: 1

image:
  # in-cluster Harbor (library 프로젝트). 빌드/배포는 CICD(#123, Jenkins→Harbor→ArgoCD).
  repository: harbor.harbor.svc.cluster.local/library/bifrost-frontend
  pullPolicy: IfNotPresent
  tag: "8192ece7"

imagePullSecrets:
  - name: harbor-push-secret

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# 사용자 진입점. ingress-nginx(NLB) + cert-manager Let's Encrypt TLS (#232).
# /api·/ws는 frontend 파드 내부 nginx가 operations-backend로 프록시(ingress 규칙 아님).
ingress:
  enabled: true
  className: nginx
  host: bifrost.skala-ai.com
  clusterIssuer: letsencrypt-prod
  path: /
