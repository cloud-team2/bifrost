apiVersion: apps/v1
kind: Deployment
metadata:
  name: operations-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bifrost.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bifrost.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bifrost.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: operations-backend
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: operations-backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: operations-backend-env
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: operations-backend-secrets
                  key: {{ .Values.secrets.jwtSecretKey }}
                  optional: true
            - name: META_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: operations-backend-secrets
                  key: {{ .Values.secrets.dbPasswordKey }}
                  optional: true
            # (#646) /internal/ops service-identity 게이트 토큰. 전용 SealedSecret 'bifrost-internal-ops'를
            # ai-service와 공유(같은 bifrost-system ns). 키가 없으면 미설정 → 게이트 비활성(무중단).
            - name: INTERNAL_OPS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bifrost-internal-ops
                  key: token
                  optional: true
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
