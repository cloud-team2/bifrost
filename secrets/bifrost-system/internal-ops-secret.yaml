# (#646) /internal/ops service-identity 토큰. ops-backend(INTERNAL_OPS_TOKEN)·ai-service(AI_INTERNAL_OPS_TOKEN)가
# 공유하는 전용 SealedSecret. 평문은 git에 없고, sealed-secrets 컨트롤러가 복호화해 Secret 'bifrost-internal-ops'를 만든다.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: bifrost-internal-ops
  namespace: bifrost-system
spec:
  encryptedData:
    token: 
  template:
    metadata:
      name: bifrost-internal-ops
      namespace: bifrost-system
    type: Opaque
